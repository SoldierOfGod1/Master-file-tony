# API Design Template

openapi: "3.1.0"
info:
  title: "[PROJECT NAME] API"
  version: "1.0.0"
  description: "API specification — generated by Agent-04, reviewed by Agent-03"

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /api/resource:
    post:
      summary: Create resource
      operationId: createResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Resource created
        "400":
          description: Validation error
        "401":
          description: Unauthorized
    get:
      summary: List resources
      operationId: listResources
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of resources

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  version:
                    type: string
                    example: "1.0.0"
                  uptime_seconds:
                    type: integer

  /metrics:
    get:
      summary: Prometheus metrics endpoint
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus-format metrics

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
